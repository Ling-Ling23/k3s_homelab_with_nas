apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashy
  namespace: dashy
  labels:
    app: dashy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashy
  template:
    metadata:
      labels:
        app: dashy
    spec:
      containers:
      - name: dashy
        image: lissy93/dashy:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "1000m"
            memory: "2Gi"
          requests:
            cpu: "100m"
            memory: "512Mi"
        volumeMounts:
        - name: data
          mountPath: /app/user-data
        - name: config
          mountPath: /app/user-data/conf.yml
          subPath: conf.yml
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dashy-data
      - name: config
        configMap:
          name: dashy-config
