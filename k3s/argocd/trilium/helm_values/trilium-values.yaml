# Trilium Notes Helm values for homelab (k3s, Raspberry Pi ARM64)

image:
  repository: zadam/trilium
  tag: latest
  pullPolicy: Always

env:
  TZ: "America/New_York"

service:
  port:
    port: 8080

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    cert-manager.io/cluster-issuer: "homelab-ca-issuer"
  hosts:
    - host: trilium.homelab.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: trilium-tls
      hosts:
        - trilium.homelab.local

persistence:
  data:
    enabled: true
    storageClass: nfs-synology
    accessMode: ReadWriteOnce
    size: 2Gi
    mountPath: /home/node/trilium-data

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "50m"
    memory: "128Mi"
