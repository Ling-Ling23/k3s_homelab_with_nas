# Trilium Notes Helm values for homelab (k3s, Raspberry Pi ARM64)
# Chart: triliumnext/trilium (bjw-s common library)

controllers:
  main:
    containers:
      trilium:
        image:
          repository: triliumnext/notes
          tag: v0.92.4
          pullPolicy: Always
        env:
          TZ: "America/New_York"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "50m"
            memory: "128Mi"

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    existingClaim: trilium-data

ingress:
  main:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "homelab-ca-issuer"
      nginx.ingress.kubernetes.io/proxy-body-size: "0"
    hosts:
      - host: trilium.homelab.local
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: 8080
    tls:
      - secretName: trilium-tls
        hosts:
          - trilium.homelab.local

configini:
  general:
    instanceName: "homelab"
    noAuthentication: false
    noBackup: false
  network:
    host: "0.0.0.0"
    port: 8080
    https: false
    trustedReverseProxy: true
