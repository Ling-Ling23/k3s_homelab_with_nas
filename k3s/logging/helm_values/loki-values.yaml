# Loki configuration for homelab
# Storage on NFS (Synology)

# Single binary deployment (simpler for homelab)
deploymentMode: SingleBinary

loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
  
  storage:
    type: filesystem
  
  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  
  # Retention policy
  limits_config:
    retention_period: 168h  # 7 days
    max_query_lookback: 168h
  
  # Chunk size optimization
  chunk_store_config:
    max_look_back_period: 168h
  
  storage_config:
    tsdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/cache

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: nfs-synology
    size: 10Gi
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Gateway for better performance
gateway:
  enabled: true
  replicas: 1
  ingress:
    enabled: false

# Monitoring integration
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false
