apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: nfs-synology
provisioner: nfs.csi.k8s.io
parameters:
  server: 192.168.0.XXX  # Change to your Synology IP
  share: /volume1/k3s-storage  # Change to your NFS share path
reclaimPolicy: Retain
volumeBindingMode: Immediate
allowVolumeExpansion: true
