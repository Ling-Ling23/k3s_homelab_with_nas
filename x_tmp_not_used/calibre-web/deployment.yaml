apiVersion: apps/v1
kind: Deployment
metadata:
  name: calibre-web
  namespace: calibre-web
  labels:
    app: calibre-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calibre-web
  template:
    metadata:
      labels:
        app: calibre-web
    spec:
      initContainers:
      - name: init-calibre-db
        image: python:3.11-alpine
        command:
          - sh
          - -c
          - |
            if [ ! -f /books/metadata.db ]; then
              echo "Creating empty Calibre metadata.db..."
              python3 -c "
            import sqlite3, os
            db = sqlite3.connect('/books/metadata.db')
            db.executescript('''
              CREATE TABLE books (id INTEGER PRIMARY KEY, title TEXT NOT NULL DEFAULT 'Unknown', sort TEXT, timestamp TIMESTAMP, pubdate TIMESTAMP, series_index REAL NOT NULL DEFAULT 1.0, author_sort TEXT, isbn TEXT DEFAULT '', lccn TEXT DEFAULT '', path TEXT NOT NULL DEFAULT '', flags INTEGER NOT NULL DEFAULT 1, uuid TEXT, has_cover BOOL DEFAULT 0, last_modified TIMESTAMP NOT NULL DEFAULT CURRENT_TIMESTAMP);
              CREATE TABLE authors (id INTEGER PRIMARY KEY, name TEXT NOT NULL, sort TEXT, link TEXT NOT NULL DEFAULT '');
              CREATE TABLE books_authors_link (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, author INTEGER NOT NULL);
              CREATE TABLE tags (id INTEGER PRIMARY KEY, name TEXT NOT NULL);
              CREATE TABLE books_tags_link (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, tag INTEGER NOT NULL);
              CREATE TABLE series (id INTEGER PRIMARY KEY, name TEXT NOT NULL, sort TEXT);
              CREATE TABLE books_series_link (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, series INTEGER NOT NULL);
              CREATE TABLE ratings (id INTEGER PRIMARY KEY, rating INTEGER CHECK(rating > -1 AND rating < 11));
              CREATE TABLE books_ratings_link (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, rating INTEGER NOT NULL);
              CREATE TABLE publishers (id INTEGER PRIMARY KEY, name TEXT NOT NULL, sort TEXT);
              CREATE TABLE books_publishers_link (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, publisher INTEGER NOT NULL);
              CREATE TABLE languages (id INTEGER PRIMARY KEY, lang_code TEXT NOT NULL);
              CREATE TABLE books_languages_link (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, lang_code INTEGER NOT NULL);
              CREATE TABLE comments (id INTEGER PRIMARY KEY, book INTEGER UNIQUE NOT NULL, text TEXT NOT NULL);
              CREATE TABLE data (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, format TEXT NOT NULL, uncompressed_size INTEGER NOT NULL, name TEXT NOT NULL);
              CREATE TABLE identifiers (id INTEGER PRIMARY KEY, book INTEGER NOT NULL, type TEXT NOT NULL DEFAULT isbn, val TEXT NOT NULL);
              CREATE TABLE feeds (id INTEGER PRIMARY KEY, title TEXT NOT NULL, script TEXT NOT NULL);
              CREATE TABLE library_id (id INTEGER PRIMARY KEY, uuid TEXT NOT NULL);
              CREATE TABLE metadata_dirtied (id INTEGER PRIMARY KEY, book INTEGER UNIQUE NOT NULL);
              CREATE TABLE conversion_options (id INTEGER PRIMARY KEY, format TEXT NOT NULL, book INTEGER DEFAULT NULL, data BLOB NOT NULL);
              CREATE TABLE preferences (id INTEGER PRIMARY KEY, key TEXT NOT NULL, val TEXT NOT NULL);
              INSERT INTO library_id(uuid) VALUES (lower(hex(randomblob(4))||hex(randomblob(2))||hex(randomblob(2))||hex(randomblob(2))||hex(randomblob(6))));
            ''')
            db.commit()
            db.close()
            print('metadata.db created.')
            "
            else
              echo "metadata.db already exists, skipping."
            fi
            chmod -R 777 /books
        volumeMounts:
        - name: books
          mountPath: /books
      containers:
      - name: calibre-web
        image: linuxserver/calibre-web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8083
        env:
        - name: PUID
          value: "0"
        - name: PGID
          value: "0"
        - name: TZ
          value: "America/New_York"
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "50m"
            memory: "128Mi"
        volumeMounts:
        - name: config
          mountPath: /config
        - name: books
          mountPath: /books
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: calibre-web-config
      - name: books
        persistentVolumeClaim:
          claimName: calibre-web-books
