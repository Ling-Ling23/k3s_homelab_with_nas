---
# Ansible Inventory for k3s Cluster
# Update the ansible_host IPs with your Raspberry Pi addresses

all:
  children:
    k3s_cluster:
      children:
        master:
          hosts:
            k3s-master-01:
              ansible_host: 192.168.0.197 #raspi1.local 
              ansible_user: lingling
              ansible_ssh_private_key_file: ~/.ssh/ansible_homelab_id_rsa
              
        workers:
          hosts:
             k3s-worker-01:
               ansible_host: 192.168.0.198  #raspi2
               ansible_user: lingling
               ansible_ssh_private_key_file: ~/.ssh/ansible_homelab_id_rsa
             k3s-worker-02:
               ansible_host: 192.168.0.199 #raspi3
               ansible_user: lingling
               ansible_ssh_private_key_file: ~/.ssh/ansible_homelab_id_rsa

  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
