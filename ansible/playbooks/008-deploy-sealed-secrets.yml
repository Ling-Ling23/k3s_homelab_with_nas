---
- name: Deploy Sealed Secrets Controller
  hosts: master
  become: no
  vars:
    namespace: kube-system
    release_name: sealed-secrets
    helm_repo_name: sealed-secrets
    helm_repo_url: https://bitnami-labs.github.io/sealed-secrets
    chart_name: sealed-secrets/sealed-secrets
    values_file: "{{ playbook_dir }}/../../k3s/sealed-secrets/helm_values/sealed-secrets-values.yaml"
    backup_dir: "{{ playbook_dir }}/../../k3s/sealed-secrets"
  
  tasks:
    - name: Add Sealed Secrets Helm repository
      kubernetes.core.helm_repository:
        name: "{{ helm_repo_name }}"
        repo_url: "{{ helm_repo_url }}"
        state: present

    - name: Update Helm repositories
      command: helm repo update
      changed_when: false

    - name: Copy Sealed Secrets values file to remote host
      copy:
        src: "{{ values_file }}"
        dest: /tmp/sealed-secrets-values.yaml
        mode: '0644'

    - name: Install/Upgrade Sealed Secrets Controller
      kubernetes.core.helm:
        name: "{{ release_name }}"
        chart_ref: "{{ chart_name }}"
        release_namespace: "{{ namespace }}"
        create_namespace: false
        values_files:
          - /tmp/sealed-secrets-values.yaml
        state: present
        wait: true
        wait_timeout: 5m

    - name: Wait for Sealed Secrets controller to be ready
      shell: kubectl get deployment sealed-secrets -n {{ namespace }} -o jsonpath='{.status.availableReplicas}'
      register: controller_ready
      until: controller_ready.stdout | int > 0
      retries: 30
      delay: 5
      changed_when: false

    - name: Verify controller is running
      shell: kubectl get pods -n {{ namespace }} -l app.kubernetes.io/name=sealed-secrets
      register: controller_status
      changed_when: false

    - name: Display controller status
      debug:
        var: controller_status.stdout_lines

    - name: Test fetching certificate
      shell: kubeseal --fetch-cert --controller-namespace={{ namespace }} --controller-name={{ release_name }}
      register: fetch_cert_test
      changed_when: false
      failed_when: false

    - name: Backup Sealed Secrets controller keys
      shell: kubectl get secret -n {{ namespace }} sealed-secrets-key -o yaml
      register: controller_keys
      changed_when: false

    - name: Save controller keys backup locally
      copy:
        content: "{{ controller_keys.stdout }}"
        dest: "{{ backup_dir }}/sealed-secrets-key-backup.yaml"
        mode: '0600'
      delegate_to: localhost
      when: controller_keys.stdout != ""

    - name: Display deployment completion
      debug:
        msg:
          - "=========================================="
          - "✅ Sealed Secrets Controller deployed!"
          - "=========================================="
          - ""
          - "Next steps:"
          - ""
          - "1. Install kubeseal CLI on your local machine:"
          - "   wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.0/kubeseal-0.26.0-linux-amd64.tar.gz"
          - "   tar -xvzf kubeseal-0.26.0-linux-amd64.tar.gz kubeseal"
          - "   sudo mv kubeseal /usr/local/bin/"
          - ""
          - "2. Verify controller is running:"
          - "   kubectl get pods -n {{ namespace }} -l app.kubernetes.io/name=sealed-secrets"
          - ""
          - "3. Test encryption:"
          - "   kubeseal --fetch-cert"
          - ""
          - "4. Create your first sealed secret:"
          - "   See k3s/sealed-secrets/README.md for examples"
          - ""
          - "5. ✅ Controller keys backed up to: {{ backup_dir }}/sealed-secrets-key-backup.yaml"
          - "   Store this file securely! You'll need it to restore if cluster is rebuilt."
