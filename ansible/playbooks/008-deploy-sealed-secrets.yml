---
- name: Deploy Sealed Secrets Controller
  hosts: master
  become: no
  vars:
    namespace: kube-system
    release_name: sealed-secrets
    helm_repo_name: sealed-secrets
    helm_repo_url: https://bitnami-labs.github.io/sealed-secrets
    chart_name: sealed-secrets/sealed-secrets
    values_file: "{{ playbook_dir }}/../../k3s/sealed-secrets/helm_values/sealed-secrets-values.yaml"
    backup_dir: "{{ playbook_dir }}/../../k3s/sealed-secrets"
    ansible_vault: "{{ playbook_dir }}/../ansible_vault"
  
  tasks:
    - name: Add Sealed Secrets Helm repository
      kubernetes.core.helm_repository:
        name: "{{ helm_repo_name }}"
        repo_url: "{{ helm_repo_url }}"
        state: present

    - name: Update Helm repositories
      command: helm repo update
      changed_when: false

    - name: Copy Sealed Secrets values file to remote host
      copy:
        src: "{{ values_file }}"
        dest: /tmp/sealed-secrets-values.yaml
        mode: '0644'

    - name: Install/Upgrade Sealed Secrets Controller
      kubernetes.core.helm:
        name: "{{ release_name }}"
        chart_ref: "{{ chart_name }}"
        release_namespace: "{{ namespace }}"
        create_namespace: false
        values_files:
          - /tmp/sealed-secrets-values.yaml
        state: present
        wait: true
        wait_timeout: 5m

    - name: Wait for Sealed Secrets controller to be ready
      shell: kubectl get deployment sealed-secrets -n {{ namespace }} -o jsonpath='{.status.availableReplicas}'
      register: controller_ready
      until: controller_ready.stdout | int > 0
      retries: 30
      delay: 5
      changed_when: false

    - name: Verify controller is running
      shell: kubectl get pods -n {{ namespace }} -l app.kubernetes.io/name=sealed-secrets
      register: controller_status
      changed_when: false

    - name: Display controller status
      debug:
        var: controller_status.stdout_lines

    - name: Check if kubeseal is already installed
      command: which kubeseal
      register: kubeseal_check
      changed_when: false
      failed_when: false

    - name: Detect architecture
      command: dpkg --print-architecture
      register: system_arch
      changed_when: false
      when: kubeseal_check.rc != 0

    - name: Set kubeseal download URL based on architecture
      set_fact:
        kubeseal_url: "https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.26.0/kubeseal-0.26.0-linux-{{ 'arm64' if system_arch.stdout == 'arm64' else 'arm' }}.tar.gz"
      when: kubeseal_check.rc != 0

    - name: Download kubeseal CLI
      get_url:
        url: "{{ kubeseal_url }}"
        dest: /tmp/kubeseal.tar.gz
        mode: '0644'
      when: kubeseal_check.rc != 0

    - name: Extract kubeseal binary
      unarchive:
        src: /tmp/kubeseal.tar.gz
        dest: /tmp/
        remote_src: yes
      when: kubeseal_check.rc != 0

    - name: Install kubeseal to /usr/local/bin
      copy:
        src: /tmp/kubeseal
        dest: /usr/local/bin/kubeseal
        mode: '0755'
        remote_src: yes
      become: yes
      when: kubeseal_check.rc != 0

    - name: Verify kubeseal installation
      command: kubeseal --version
      register: kubeseal_version
      changed_when: false

    - name: Display kubeseal version
      debug:
        msg: "kubeseal installed: {{ kubeseal_version.stdout }}"

    - name: Test fetching certificate
      shell: kubeseal --fetch-cert --controller-namespace={{ namespace }} --controller-name={{ release_name }}
      register: fetch_cert_test
      changed_when: false
      failed_when: false

    - name: Find Sealed Secrets controller key secret name
      shell: kubectl get secrets -n {{ namespace }} -o name | grep 'sealed-secrets-key' | head -n 1
      register: key_secret_name
      changed_when: false
      failed_when: key_secret_name.stdout == ""

    - name: Extract secret name without prefix
      set_fact:
        secret_name: "{{ key_secret_name.stdout | regex_replace('^secret/', '') }}"

    - name: Backup Sealed Secrets controller keys
      shell: kubectl get secret -n {{ namespace }} {{ secret_name }} -o yaml
      register: controller_keys
      changed_when: false

    - name: Save controller keys backup locally
      copy:
        content: "{{ controller_keys.stdout }}"
        dest: "{{ backup_dir }}/sealed-secrets-key-backup.yaml"
        mode: '0600'
      delegate_to: localhost
      when: controller_keys.stdout != ""

    - name: Check if vault file already exists
      stat:
        path: "{{ ansible_vault }}/sealed-secrets-key.yml"
      delegate_to: localhost
      register: vault_file_stat

    - name: Remove old vault file if it exists
      file:
        path: "{{ ansible_vault }}/sealed-secrets-key.yml"
        state: absent
      delegate_to: localhost
      when: vault_file_stat.stat.exists

    - name: Save controller keys to temp file for encryption
      copy:
        content: "{{ controller_keys.stdout }}"
        dest: "{{ ansible_vault }}/sealed-secrets-key.yml"
        mode: '0600'
      delegate_to: localhost
      when: controller_keys.stdout != ""
      no_log: true

    - name: Encrypt controller keys with Ansible Vault
      command: ansible-vault encrypt {{ ansible_vault }}/sealed-secrets-key.yml --ask-vault-pass
      delegate_to: localhost
      when: controller_keys.stdout != ""
      register: vault_encrypt

    - name: Verify encryption succeeded
      stat:
        path: "{{ ansible_vault }}/sealed-secrets-key.yml"
      delegate_to: localhost
      register: encrypted_file

    - name: Check file starts with vault header
      shell: head -n 1 {{ ansible_vault }}/sealed-secrets-key.yml
      delegate_to: localhost
      register: vault_header
      changed_when: false

    - name: Fail if encryption didn't work
      fail:
        msg: "Vault encryption failed! File is not encrypted."
      when: not vault_header.stdout.startswith('$ANSIBLE_VAULT')

    - name: Display deployment completion
      debug:
        msg:
          - "=========================================="
          - "✅ Sealed Secrets Controller deployed!"
          - "=========================================="
          - ""
          - "Next steps:"
          - ""
          - ""
          - "1. Create your first sealed secret:"
          - "   See k3s/sealed-secrets/README.md for examples"
          - ""
          - "2. ✅ Controller keys backed up to:"
          - "   - Plain: {{ backup_dir }}/sealed-secrets-key-backup.yaml (local only, NOT in git)"
          - "   - Vault: ansible/ansible-vault/sealed-secrets-key.yml (encrypted, safe to commit)"
          - ""
          - "3. Store plain backup securely offline (USB drive, password manager, etc.)"
          - "   You'll need it to restore if cluster is rebuilt and vault is lost."
