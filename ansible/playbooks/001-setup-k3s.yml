---
- name: Install k3s on master node
  hosts: master
  become: yes
  tasks:
    - name: Download k3s installation script
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'

    - name: Install k3s server
      shell: |
        INSTALL_K3S_VERSION={{ k3s_version }} \
        K3S_TOKEN={{ k3s_token }} \
        sh /tmp/k3s-install.sh server {{ k3s_master_extra_args }}
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s to be ready
      wait_for:
        port: "{{ k3s_api_port }}"
        delay: 5
        timeout: 300

    - name: Wait for node to be ready
      shell: kubectl get nodes {{ ansible_hostname }} --no-headers | awk '{print $2}'
      register: node_status
      until: node_status.stdout == "Ready"
      retries: 30
      delay: 10
      changed_when: false

    - name: Create .kube directory for pi user
      file:
        path: /home/{{ ansible_user }}/.kube
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy kubeconfig for pi user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/{{ ansible_user }}/.kube/config
        remote_src: yes
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Download Helm installation script
      get_url:
        url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
        dest: /tmp/get_helm.sh
        mode: '0755'

    - name: Install Helm
      shell: /tmp/get_helm.sh
      args:
        creates: /usr/local/bin/helm

    - name: Verify Helm installation
      shell: helm version --short
      register: helm_version
      changed_when: false

    - name: Display Helm version
      debug:
        msg: "Helm installed: {{ helm_version.stdout }}"

    - name: Fetch kubeconfig to local machine
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /tmp/k3s-kubeconfig
        flat: yes

- name: Configure local kubeconfig
  hosts: localhost
  gather_facts: no
  connection: local
  tasks:
    - name: Read kubeconfig
      slurp:
        src: /tmp/k3s-kubeconfig
      register: kubeconfig_content

    - name: Ensure .kube directory exists
      file:
        path: "{{ (kubeconfig_local_path | expanduser) | dirname }}"
        state: directory
        mode: '0755'

    - name: Update kubeconfig with correct server address
      copy:
        content: "{{ kubeconfig_content.content | b64decode | regex_replace('127.0.0.1', k3s_server_ip) }}"
        dest: "{{ kubeconfig_local_path | expanduser }}"
        mode: '0600'

    - name: Display kubeconfig location
      debug:
        msg: "Kubeconfig saved to {{ kubeconfig_local_path | expanduser }}"

- name: Install k3s on worker nodes
  hosts: workers
  become: yes
  tasks:
    - name: Download k3s installation script
      get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: '0755'
      when: inventory_hostname in groups['workers']

    - name: Install k3s agent
      shell: |
        INSTALL_K3S_VERSION={{ k3s_version }} \
        K3S_URL=https://{{ k3s_server_ip }}:{{ k3s_api_port }} \
        K3S_TOKEN={{ k3s_token }} \
        sh /tmp/k3s-install.sh agent {{ k3s_worker_extra_args }}
      args:
        creates: /usr/local/bin/k3s
      when: inventory_hostname in groups['workers']

    - name: Wait for worker node to be ready
      shell: kubectl --kubeconfig /etc/rancher/k3s/k3s.yaml get nodes {{ inventory_hostname }} --no-headers | awk '{print $2}'
      register: worker_status
      until: worker_status.stdout == "Ready"
      retries: 30
      delay: 10
      changed_when: false
      delegate_to: "{{ groups['master'][0] }}"
      when: inventory_hostname in groups['workers']

    - name: Verify k3s installation
      shell: k3s --version
      register: k3s_version_output
      changed_when: false
      when: inventory_hostname in groups['workers']