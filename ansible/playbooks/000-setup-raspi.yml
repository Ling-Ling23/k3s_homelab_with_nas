---
- name: Prepare all raspi nodes
  hosts: k3s_cluster
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: yes

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - nfs-common
          - iptables
          - iptables-persistent
        state: present

    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

    - name: Install Python Kubernetes library
      apt:
        name: python3-kubernetes
        state: present
      become: yes

    - name: Disable swap
      command: swapoff -a
      when: enable_swap == false

    - name: Remove swap from fstab
      lineinfile:
        path: /etc/fstab
        regexp: '^.*swap.*$'
        state: absent
      when: enable_swap == false

    - name: Increase file descriptor limits for logging
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
        sysctl_file: /etc/sysctl.d/99-k3s-logging.conf
      loop:
        - { key: 'fs.file-max', value: '100000' }
        - { key: 'fs.inotify.max_user_instances', value: '256' }
        - { key: 'fs.inotify.max_user_watches', value: '524288' }

    - name: Check for cmdline.txt location
      stat:
        path: "{{ item }}"
      register: cmdline_check
      loop:
        - /boot/firmware/cmdline.txt
        - /boot/cmdline.txt

    - name: Set cmdline path (prefer firmware location)
      set_fact:
        cmdline_path: "{{ cmdline_check.results | selectattr('stat.exists') | map(attribute='item') | first }}"

    - name: Read current cmdline.txt content
      slurp:
        src: "{{ cmdline_path }}"
      register: cmdline_content

    - name: Check if cgroups are already enabled properly
      set_fact:
        cgroups_enabled: "{{ (cmdline_content.content | b64decode | regex_search('console=.*cgroup_memory=1')) is not none }}"

    - name: Display cmdline status
      debug:
        msg: "Cmdline path: {{ cmdline_path }}, Cgroups enabled: {{ cgroups_enabled }}"

    - name: Enable cgroup memory and cpuset
      replace:
        path: "{{ cmdline_path }}"
        regexp: '^(console=.*)$'
        replace: '\1 cgroup_memory=1 cgroup_enable=memory'
      when: 
        - not cgroups_enabled
        - cmdline_path == '/boot/firmware/cmdline.txt'
      notify: reboot pi

    - name: Fix corrupted /boot/cmdline.txt if it exists
      copy:
        content: |
          DO NOT EDIT THIS FILE
          The file you are looking for has moved to /boot/firmware/cmdline.txt
        dest: /boot/cmdline.txt
      when: cmdline_check.results[1].stat.exists
      ignore_errors: yes

    - name: Enable legacy iptables
      alternatives:
        name: iptables
        path: /usr/sbin/iptables-legacy
      failed_when: false

    - name: Enable legacy ip6tables
      alternatives:
        name: ip6tables
        path: /usr/sbin/ip6tables-legacy
      failed_when: false

    ### ADITIONAL STUFF - DIFFRENT PLAYBOOK LATER
    - name: Install open-iscsi
      apt:
        name: open-iscsi
        state: present

    - name: Enable iscsid service
      systemd:
        name: iscsid
        enabled: yes
        state: started

    - name: Verify iscsiadm is available
      command: iscsiadm --version
      register: iscsiadm_version
      changed_when: false

    - name: Display iscsiadm version
      debug:
        msg: "iscsiadm version: {{ iscsiadm_version.stdout }}"

    - name: Grant passwordless sudo to lingling
      lineinfile:
        path: /etc/sudoers.d/lingling
        line: 'lingling ALL=(ALL) NOPASSWD: ALL'
        create: yes
        mode: '0440'
        validate: 'visudo -cf %s'
      become: yes

    - name: Create .bash_aliases file
      blockinfile:
        path: "/home/{{ ansible_user }}/.bash_aliases"
        create: yes
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED - K3S ALIASES"
        block: |
          # Docker aliases
          alias d='docker'
          alias dc='docker compose'
          alias dps='docker ps'
          alias dpsa='docker ps -a'
          alias di='docker images'
          alias dex='docker exec -it'
          alias dlogs='docker logs -f'
          
          # Kubectl aliases
          alias k='kubectl'
          alias kaf='kubectl apply -f'
          alias kctx='kubectl config get-contexts'
          alias kd='kubectl describe'
          alias ke='kubectl explain'
          alias kex='kubectl exec -it'
          alias kg='kubectl get'
          alias kgds='kubectl get daemonsets'
          alias kgj='kubectl get jobs'
          alias kgp='kubectl get pods'
          alias kgpa='kubectl get pods -A'
          alias kgs='kubectl get services'
          alias kgn='kubectl get nodes'
          alias kgrs='kubectl get rs'
          alias kl='kubectl logs'
          alias klf='kubectl logs -f'
          alias watch-pods='watch kubectl get pods -A'
          alias k3s-status='systemctl status k3s'
          alias k3s-logs='journalctl -u k3s -f'
          alias kgpn='kubectl get pods -A --field-selector=status.phase!=Running'

          # Kubectl shortcuts with watch
          alias watch-pods='watch kubectl get pods -A'
          alias watch-nodes='watch kubectl get nodes'
          
          # k3s specific
          alias k3s-status='sudo systemctl status k3s'
          alias k3s-restart='sudo systemctl restart k3s'
          alias k3s-logs='sudo journalctl -u k3s -f'
          
          # Helm aliases (if you use Helm later)
          alias h='helm'
          alias hls='helm list'
          alias hlsa='helm list -A'
          alias hin='helm install'
          alias hup='helm upgrade'
          
          # Common shortcuts
          alias ll='ls -alh'
          alias la='ls -A'
          alias l='ls -CF'
          alias ..='cd ..'
          alias ...='cd ../..'

    - name: Ensure .bash_aliases is sourced in .bashrc
      lineinfile:
        path: "/home/{{ ansible_user }}/.bashrc"
        line: "{{ item }}"
        create: yes
      loop:
        - "# Source bash aliases"
        - "if [ -f ~/.bash_aliases ]; then"
        - "    . ~/.bash_aliases"
        - "fi"

    - name: Display instructions
      debug:
        msg: |
          Aliases configured successfully!
          Run 'source ~/.bashrc' or log out and back in to use them.
          
          Quick reference:
          - d = docker
          - k = kubectl
          - kg = kubectl get
          - kd = kubectl describe
          - kgp = kubectl get pods
          - kgpa = kubectl get pods -A
          - kl = kubectl logs
          - klf = kubectl logs -f

  handlers:
    - name: reboot pi
      reboot:
        reboot_timeout: 300

- name: Apply aliases for root user (master node only)
  hosts: master
  become: yes
  tasks:
    - name: Create root .bash_aliases
      blockinfile:
        path: /root/.bash_aliases
        create: yes
        mode: '0644'
        marker: "# {mark} ANSIBLE MANAGED - K3S ALIASES"
        block: |
          # Kubectl aliases
          alias k='kubectl'
          alias kaf='kubectl apply -f'
          alias kctx='kubectl config get-contexts'
          alias kd='kubectl describe'
          alias ke='kubectl explain'
          alias kex='kubectl exec -it'
          alias kg='kubectl get'
          alias kgds='kubectl get daemonsets'
          alias kgj='kubectl get jobs'
          alias kgp='kubectl get pods'
          alias kgpa='kubectl get pods -A'
          alias kgs='kubectl get services'
          alias kgn='kubectl get nodes'
          alias kgrs='kubectl get rs'
          alias kl='kubectl logs'
          alias klf='kubectl logs -f'
          alias watch-pods='watch kubectl get pods -A'
          alias k3s-status='systemctl status k3s'
          alias k3s-logs='journalctl -u k3s -f'


    - name: Ensure root .bash_aliases is sourced
      lineinfile:
        path: /root/.bashrc
        line: "{{ item }}"
        create: yes
      loop:
        - "if [ -f ~/.bash_aliases ]; then"
        - "    . ~/.bash_aliases"
        - "fi"