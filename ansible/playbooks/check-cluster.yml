---
- name: Check k3s cluster status
  hosts: master
  become: yes
  tasks:
    - name: Get cluster info
      command: kubectl cluster-info
      register: cluster_info
      changed_when: false

    - name: Display cluster info
      debug:
        var: cluster_info.stdout_lines

    - name: Get all nodes
      command: kubectl get nodes -o wide
      register: nodes
      changed_when: false

    - name: Display nodes
      debug:
        var: nodes.stdout_lines

    - name: Get all pods in all namespaces
      command: kubectl get pods -A
      register: pods
      changed_when: false

    - name: Display pods
      debug:
        var: pods.stdout_lines

    - name: Get k3s version
      command: k3s --version
      register: k3s_ver
      changed_when: false

    - name: Display k3s version
      debug:
        var: k3s_ver.stdout_lines
