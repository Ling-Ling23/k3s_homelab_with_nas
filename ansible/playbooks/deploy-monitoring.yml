---
- name: Deploy Monitoring Stack (Prometheus, Grafana, Alertmanager)
  hosts: master
  become: no
  vars:
    monitoring_namespace: monitoring
    helm_repo_name: prometheus-community
    helm_repo_url: https://prometheus-community.github.io/helm-charts
    helm_chart: prometheus-community/kube-prometheus-stack
    helm_release_name: kube-prometheus-stack
    values_file: "{{ playbook_dir }}/../../k3s/monitoring/prometheus-values.yaml"
    
  tasks:
    - name: Add Prometheus Helm repository
      kubernetes.core.helm_repository:
        name: "{{ helm_repo_name }}"
        repo_url: "{{ helm_repo_url }}"
        state: present

    - name: Update Helm repositories
      command: helm repo update
      changed_when: false

    - name: Create monitoring namespace
      kubernetes.core.k8s:
        name: "{{ monitoring_namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    - name: Check if monitoring stack is already installed
      shell: helm list -n {{ monitoring_namespace }} | grep -q {{ helm_release_name }}
      register: helm_check
      failed_when: false
      changed_when: false

    - name: Install/Upgrade Prometheus Stack
      kubernetes.core.helm:
        name: "{{ helm_release_name }}"
        chart_ref: "{{ helm_chart }}"
        release_namespace: "{{ monitoring_namespace }}"
        create_namespace: true
        values_files:
          - "{{ values_file }}"
        state: present
        wait: true
        wait_timeout: 10m

    - name: Wait for Prometheus to be ready
      kubernetes.core.k8s_info:
        kind: StatefulSet
        namespace: "{{ monitoring_namespace }}"
        name: prometheus-{{ helm_release_name }}-prometheus
      register: prometheus_statefulset
      until: 
        - prometheus_statefulset.resources | length > 0
        - prometheus_statefulset.resources[0].status.readyReplicas is defined
        - prometheus_statefulset.resources[0].status.readyReplicas == prometheus_statefulset.resources[0].status.replicas
      retries: 30
      delay: 10

    - name: Wait for Grafana to be ready
      kubernetes.core.k8s_info:
        kind: Deployment
        namespace: "{{ monitoring_namespace }}"
        name: "{{ helm_release_name }}-grafana"
      register: grafana_deployment
      until: 
        - grafana_deployment.resources | length > 0
        - grafana_deployment.resources[0].status.readyReplicas is defined
        - grafana_deployment.resources[0].status.readyReplicas == grafana_deployment.resources[0].status.replicas
      retries: 30
      delay: 10

    - name: Get Grafana service
      kubernetes.core.k8s_info:
        kind: Service
        namespace: "{{ monitoring_namespace }}"
        name: "{{ helm_release_name }}-grafana"
      register: grafana_service

    - name: Display monitoring stack info
      debug:
        msg:
          - "Monitoring stack deployed successfully!"
          - "Grafana URL: http://grafana.homelab.local"
          - "Prometheus URL: Access via port-forward: kubectl port-forward -n monitoring svc/kube-prometheus-stack-prometheus 9090:9090"
          - "Default Grafana credentials: admin / admin (change this!)"

- name: Deploy Longhorn and NGINX Ingress configurations
  hosts: master
  become: no
  tasks:
    - name: Apply Longhorn StorageClass (2 replicas)
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k3s/longhorn/longhorn-storageclass.yaml"
      when: lookup('file', playbook_dir + '/../../k3s/longhorn/longhorn-storageclass.yaml', errors='ignore') | default(false)

    - name: Apply Longhorn Ingress
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k3s/longhorn/longhorn-ingress.yaml"

    - name: Apply Dashboard Ingress
      kubernetes.core.k8s:
        state: present
        src: "{{ playbook_dir }}/../../k3s/nginx_ingress/dashboard-ingress.yaml"

    - name: Get all ingresses
      kubernetes.core.k8s_info:
        kind: Ingress
        namespace: ""
      register: all_ingresses

    - name: Display ingress URLs
      debug:
        msg: "{{ all_ingresses.resources | map(attribute='spec') | map(attribute='rules') | flatten | map(attribute='host') | list }}"
